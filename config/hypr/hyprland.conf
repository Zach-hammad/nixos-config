# ── Monitors ──────────────────────────────────────────
# Work: left 27", ultrawide center (primary), right 27", laptop below left
monitor=DP-1,2560x1440@60,0x0,1
monitor=HDMI-A-1,3440x1440@60,2560x0,1
monitor=DP-3,2560x1440@60,6000x0,1
monitor=eDP-1,1920x1200@60,0x1440,1

# Fallback
monitor=,preferred,auto,1

# ── Autostart ─────────────────────────────────────────
exec-once = waybar
exec-once = mako
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = mpvpaper -o "loop" eDP-1 ~/.config/wallpaper/ascii-rain.mp4
exec-once = mpvpaper -o "loop" DP-1 ~/.config/wallpaper/ascii-rain.mp4
exec-once = mpvpaper -o "loop" HDMI-A-1 ~/.config/wallpaper/ascii-rain.mp4
exec-once = mpvpaper -o "loop" DP-3 ~/.config/wallpaper/ascii-rain.mp4
exec-once = hypridle
exec-once = systemctl --user start hyprpolkitagent
exec-once = nm-applet --indicator
exec-once = blueman-applet

# ── Environment ───────────────────────────────────────
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = GTK_THEME,adw-gtk3-dark
env = XCURSOR_THEME,Bibata-Modern-Classic

# ── General ───────────────────────────────────────────
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 1
    col.active_border = rgb(d4d4d4)
    col.inactive_border = rgb(1a1a1a)
    layout = dwindle
    allow_tearing = false
}

# ── Decoration ────────────────────────────────────────
decoration {
    rounding = 0
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}

# ── Animations — digital/glitch feel ──────────────────
animations {
    enabled = true
    bezier = instant, 0.0, 1.0, 0.0, 1.0
    bezier = digital, 0.2, 1.0, 0.0, 1.0
    animation = windows, 1, 2, digital, popin 90%
    animation = windowsOut, 1, 1, instant, popin 70%
    animation = fade, 1, 2, digital
    animation = workspaces, 1, 2, instant, slidevert
    animation = border, 1, 1, instant
    animation = borderangle, 1, 30, digital, loop
}

# ── Input ─────────────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
    sensitivity = 0
}

# ── Layout ────────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

# ── Misc ──────────────────────────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# ── Keybindings ───────────────────────────────────────
$mod = SUPER

# Core
bind = $mod, Q, exec, alacritty
bind = $mod, Return, exec, alacritty
bind = $mod, C, killactive
bind = $mod, M, exit
bind = $mod, V, togglefloating
bind = $mod, E, exec, wofi --show drun
bind = $mod, P, pseudo
bind = $mod, S, togglesplit
bind = $mod, F, fullscreen
bind = $mod, L, exec, hyprlock
bind = $mod, X, exec, wlogout

# Move focus
bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d

# Move windows
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, l, movewindow, r
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, j, movewindow, d

# Resize
bind = $mod CTRL, h, resizeactive, -40 0
bind = $mod CTRL, l, resizeactive, 40 0
bind = $mod CTRL, k, resizeactive, 0 -40
bind = $mod CTRL, j, resizeactive, 0 40

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

# Move window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Screenshots
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim - | wl-copy

# Volume / brightness
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
binde = , XF86MonBrightnessUp, exec, brightnessctl s 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

# ── Window Rules ──────────────────────────────────────
windowrule = match:class = pavucontrol, float = on
windowrule = match:class = nm-connection-editor, float = on
windowrule = match:title = Open File, float = on
windowrule = match:title = Save File, float = on
