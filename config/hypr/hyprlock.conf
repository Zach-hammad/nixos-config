general {
    hide_cursor = true
    grace = 5
}

background {
    monitor =
    color = rgb(0a0a0a)
    blur_passes = 0
}

# ASCII art header
label {
    monitor =
    text = cmd[update:1000] echo "┌──────────────────────────────────┐"
    color = rgb(303030)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, 160
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "│  > system locked                 │"
    color = rgb(606060)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, 140
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "│  > authenticate to continue      │"
    color = rgb(606060)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "└──────────────────────────────────┘"
    color = rgb(303030)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, 100
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = $TIME
    color = rgb(d4d4d4)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 40
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    color = rgb(606060)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -20
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 300, 36
    outline_thickness = 1
    dots_size = 0.2
    dots_spacing = 0.3
    outer_color = rgb(1a1a1a)
    inner_color = rgb(0a0a0a)
    font_color = rgb(d4d4d4)
    fade_on_empty = false
    placeholder_text = <i>> _</i>
    hide_input = false
    position = 0, -80
    halign = center
    valign = center
}
