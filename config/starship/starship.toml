format = """$directory$git_branch$git_status$rust$python$nix_shell$character"""

[character]
success_symbol = "[›](white)"
error_symbol = "[›](bright-black)"

[directory]
style = "white"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
format = " [$branch]($style)"
style = "bright-black"

[git_status]
format = "[$all_status$ahead_behind]($style) "
style = "bright-black"

[rust]
format = " [$symbol$version]($style)"
style = "bright-black"
symbol = "rs "

[python]
format = " [$symbol$version]($style)"
style = "bright-black"
symbol = "py "

[nix_shell]
format = " [$symbol$state]($style)"
style = "bright-black"
symbol = "nix "

[nodejs]
disabled = true

[package]
disabled = true

[cmd_duration]
disabled = true
