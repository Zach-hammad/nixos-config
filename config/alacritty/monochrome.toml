# Monochrome Dark — wider contrast range for readability

[colors.primary]
background = "#0a0a0a"
foreground = "#d4d4d4"
dim_foreground = "#6a6a6a"
bright_foreground = "#f5f5f5"

[colors.cursor]
text = "#0a0a0a"
cursor = "#ffffff"

[colors.vi_mode_cursor]
text = "#0a0a0a"
cursor = "#ffffff"

[colors.search]
matches = { foreground = "#0a0a0a", background = "#888888" }
focused_match = { foreground = "#0a0a0a", background = "#ffffff" }

[colors.hints]
start = { foreground = "#0a0a0a", background = "#cccccc" }
end = { foreground = "#0a0a0a", background = "#888888" }

[colors.selection]
text = "#000000"
background = "#ffffff"

[colors.footer_bar]
foreground = "#d4d4d4"
background = "#1a1a1a"

[colors.normal]
black   = "#1a1a1a"
red     = "#e0e0e0"
green   = "#c0c0c0"
yellow  = "#ffffff"
blue    = "#909090"
magenta = "#b0b0b0"
cyan    = "#a0a0a0"
white   = "#d4d4d4"

[colors.bright]
black   = "#505050"
red     = "#f0f0f0"
green   = "#e0e0e0"
yellow  = "#ffffff"
blue    = "#b0b0b0"
magenta = "#d0d0d0"
cyan    = "#c0c0c0"
white   = "#ffffff"

[colors.dim]
black   = "#101010"
red     = "#808080"
green   = "#707070"
yellow  = "#909090"
blue    = "#505050"
magenta = "#606060"
cyan    = "#585858"
white   = "#909090"
